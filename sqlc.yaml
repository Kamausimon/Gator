version: "2"
sql:
  - schema: "sql/schema"
    queries: "sql/queries"
    engine: "postgresql"
    gen:
      go:
        package: "database"
        out: "internal/database"
        sql_package: "database/sql"
        # Add your overrides section here:
        overrides:
          - column: "users.id"
            go_type: 
                 import: "github.com/google/uuid"
                 type: "UUID"
